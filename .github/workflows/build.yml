name: Build

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to use for the release (e.g. v1.2.3)'
        required: true

jobs:
  build-linux:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            libgtk-4-dev \
            libvte-2.91-gtk4-dev \
            libgirepository1.0-dev \
            upx

      - name: Build
        run: |
          go build \
            -ldflags "-X github.com/abunjevac/bterm/internal/version.Version=${{ env.RELEASE_TAG }}" \
            -o bterm \
            ./cmd/bterm
          upx -9 -q bterm

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ env.RELEASE_TAG }}" \
            --title "bterm ${{ env.RELEASE_TAG }}" \
            --generate-notes \
            bterm

      - name: Prune old releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          releases=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName --jq '.[].tagName')
          count=$(echo "$releases" | grep -c .)
          if [ "$count" -le 3 ]; then
            echo "Only $count release(s); nothing to prune."
            exit 0
          fi
          echo "$releases" | tail -n +4 | while IFS= read -r tag; do
            echo "Deleting release $tag"
            gh release delete "$tag" --repo "${{ github.repository }}" --yes --cleanup-tag
          done

      - name: Prune old workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          runs=$(gh run list --workflow=build.yml --repo "${{ github.repository }}" --limit 100 --json databaseId --jq '.[].databaseId')
          count=$(echo "$runs" | grep -c .)
          if [ "$count" -le 3 ]; then
            echo "Only $count run(s); nothing to prune."
            exit 0
          fi
          echo "$runs" | tail -n +4 | while IFS= read -r id; do
            echo "Deleting run $id"
            gh run delete "$id" --repo "${{ github.repository }}"
          done
